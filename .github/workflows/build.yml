name: Build

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  build:
    name: Assemble & unit test
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble debug APK
        run: ./gradlew :composeApp:assembleDebug --stacktrace

      - name: Run unit tests
        run: ./gradlew :composeApp:testDebugUnitTest --stacktrace

      - name: Android lint
        run: ./gradlew :composeApp:lintDebug --stacktrace

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports
          path: |
            composeApp/build/reports/
            composeApp/build/test-results/
          if-no-files-found: ignore
