name: Release Build

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

concurrency:
  group: release-build-${{ github.event.release.tag_name || inputs.tag }}
  cancel-in-progress: false

# Notes:
#   The release APK is built unsigned. To produce a signed APK/AAB suitable
#   for Play distribution, wire up a signingConfig in composeApp/build.gradle.kts
#   that reads SHOKZ_KEYSTORE_PATH/PASSWORD/KEY_ALIAS/KEY_PASSWORD from env,
#   then add a step here that decodes a base64 SIGNING_KEYSTORE secret to
#   $SHOKZ_KEYSTORE_PATH before assembleRelease.
jobs:
  build-release:
    name: Build & upload release APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      TAG_NAME: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: >-
            platform-tools
            platforms;android-36
            build-tools;36.0.0

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble release
        run: ./gradlew :composeApp:assembleRelease :composeApp:bundleRelease --stacktrace

      - name: Stage artifacts
        id: stage
        run: |
          set -euo pipefail
          mkdir -p _release
          version="${TAG_NAME#v}"
          shopt -s nullglob
          # APKs land as composeApp-release.apk (signed) or
          # composeApp-release-unsigned.apk (no signingConfig). Either way
          # we publish it as shokz-<version>.apk; the suffix encodes signing
          # state for transparency.
          for f in composeApp/build/outputs/apk/release/*.apk; do
            name=$(basename "$f" .apk)
            suffix=""
            case "$name" in
              *-unsigned) suffix="-unsigned" ;;
            esac
            cp "$f" "_release/shokz-${version}${suffix}.apk"
          done
          for f in composeApp/build/outputs/bundle/release/*.aab; do
            cp "$f" "_release/shokz-${version}.aab"
          done
          ls -la _release/
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: |
            _release/*.apk
            _release/*.aab
          fail_on_unmatched_files: true

      - name: Upload workflow artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ steps.stage.outputs.version }}
          path: _release/
