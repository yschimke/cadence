syntax = "proto3";

import "google/protobuf/timestamp.proto";

package ee.schimke.shokz.datastore.proto;

message Settings {
  repeated Device devices = 1;
  repeated Bookmark bookmarks = 2;
}

message Device {
  string id = 1;
  string name = 2;
  string path = 3;
}

message Bookmark {
  string name = 1;
  string url = 2;
  string favicon = 3;
}